<!DOCTYPE html>
<html>
<head>

    <title>Add Company</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>

<div class="container mt-5">

    <h2 class="mb-4">Placement Management</h2>

    <form method="POST">

        <div class="mb-3">
            <label class="form-label">Company Name</label>
            <input
                type="text"
                name="company_name"
                class="form-control"
                required>
        </div>

        <div class="mb-3">
            <label class="form-label">Job Role</label>
            <input
                type="text"
                name="job_role"
                class="form-control"
                required>
        </div>

        <div class="mb-3">
            <label class="form-label">Package (LPA)</label>
            <input
                type="number"
                step="0.01"
                name="package"
                class="form-control"
                required>
        </div>

        <div class="mb-3">
            <label class="form-label">Eligibility CGPA</label>
            <input
                type="number"
                step="0.01"
                name="eligibility_cgpa"
                class="form-control"
                required>
        </div>

        <div class="mb-3">
            <label class="form-label">Interview Date</label>
            <input
                type="date"
                name="interview_date"
                class="form-control"
                required>
        </div>

        <button class="btn btn-primary">
            Add Company
        </button>

        <a href="/view_companies" class="btn btn-success">
            View Companies
        </a>

    </form>

</div>

</body>
</html>
