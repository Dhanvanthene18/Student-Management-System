<!DOCTYPE html>
<html>
<head>
    <title>Add Fee</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h2 class="mb-4">Student Fee Management</h2>

    <form method="POST">

        <div class="mb-3">
            <label class="form-label">Student</label>

            <select name="student_id" class="form-control" required>

                <option value="">Select Student</option>

                {% for student in students %}

                <option value="{{ student[0] }}">
                    {{ student[1] }}
                </option>

                {% endfor %}

            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Total Fee</label>

            <input
                type="number"
                name="total_fee"
                class="form-control"
                required>
        </div>

        <div class="mb-3">
            <label class="form-label">Paid Fee</label>

            <input
                type="number"
                name="paid_fee"
                class="form-control"
                required>
        </div>

        <button class="btn btn-success">
            Save Fee
        </button>

        <a href="/view_fees" class="btn btn-secondary">
            View Fees
        </a>

    </form>

</div>

</body>
</html>
