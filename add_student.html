<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Student</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f5f7fb;
        }

        .card{
            margin-top:40px;
            border:none;
            border-radius:15px;
            box-shadow:0 8px 20px rgba(0,0,0,.1);
        }

        .card-header{
            background:#2563eb;
            color:white;
            font-size:25px;
            font-weight:bold;
            border-radius:15px 15px 0 0 !important;
        }

        .btn-primary{
            background:#2563eb;
            border:none;
        }

        .btn-primary:hover{
            background:#1d4ed8;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="card">

        <div class="card-header">
            Add Student
        </div>

        <div class="card-body">

            <!-- FORM STARTS HERE -->
            <form method="POST" enctype="multipart/form-data">

                <div class="mb-3">
                    <label class="form-label">Name</label>

                    <input
                        type="text"
                        name="name"
                        class="form-control"
                        required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Email</label>

                    <input
                        type="email"
                        name="email"
                        class="form-control"
                        required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Department</label>

                    <input
                        type="text"
                        name="department"
                        class="form-control"
                        required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Year</label>

                    <input
                        type="number"
                        name="year"
                        class="form-control"
                        required>
                </div>

                <div class="mb-4">
                    <label class="form-label">Student Photo</label>

                    <input
                        type="file"
                        name="photo"
                        class="form-control"
                        accept="image/*"
                        required>
                </div>

                <button type="submit" class="btn btn-primary">
                    Add Student
                </button>

                <a href="/dashboard" class="btn btn-secondary">
                    Back
                </a>

            </form>
            <!-- FORM ENDS HERE -->

        </div>

    </div>

</div>

</body>
</html>
