<!DOCTYPE html>
<html>
<head>

<title>Add Subject</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<div class="card shadow">

<div class="card-header bg-primary text-white">

<h3>Add Subject</h3>

</div>

<div class="card-body">

<form method="POST">

<div class="mb-3">

<label>Subject Name</label>

<input
type="text"
name="subject_name"
class="form-control"
required>

</div>

<div class="mb-3">

<label>Department</label>

<input
type="text"
name="department"
class="form-control"
required>

</div>

<button class="btn btn-success">
Add Subject
</button>

</form>

</div>

</div>

</div>

</body>
</html>
