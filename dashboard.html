<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="card-body">

    <h4>Total Students: {{ total_students }}</h4>

    <br>

    <a href="/add_student" class="btn btn-primary">
        Add Student
    </a>

    <a href="/view_students" class="btn btn-success">
        View Students
    </a>
    <a href="/search_student" class="btn btn-info">
    Search Student
    </a>
    <a href="/logout" class="btn btn-danger">
    Logout
    </a>
    <a href="/attendance" class="btn btn-dark">
    Attendance
    </a>
    <a href="/view_attendance" class="btn btn-secondary">
    View Attendance
    </a>
    <a href="/attendance_report" class="btn btn-info">
    Attendance Report
    </a>

</div>

</body>
</html>
