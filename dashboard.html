<!DOCTYPE html>
<html>
<head>
    <title>Student Management Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <style>

        body{
            background:#f5f7fb;
            margin:0;
        }

        .sidebar{
            width:250px;
            height:100vh;
            position:fixed;
            background:white;
            padding:20px;
            box-shadow:0 0 15px rgba(0,0,0,0.1);
        }

        .sidebar h3{
            color:#2563eb;
            margin-bottom:30px;
        }

        .sidebar a{
            display:block;
            text-decoration:none;
            color:#333;
            padding:12px;
            border-radius:10px;
            margin-bottom:10px;
        }

        .sidebar a:hover{
            background:#2563eb;
            color:white;
        }

        .main{
            margin-left:270px;
            padding:30px;
        }

        .topbar{
            background:white;
            padding:15px 25px;
            border-radius:15px;
            box-shadow:0 3px 10px rgba(0,0,0,0.08);
            margin-bottom:25px;
        }

        .stat-card{
            border:none;
            border-radius:18px;
            color:white;
            padding:25px;
            box-shadow:0 4px 15px rgba(0,0,0,0.1);
        }

        .blue{
            background:#2563eb;
        }

        .green{
            background:#16a34a;
        }

        .orange{
            background:#f59e0b;
        }

        .purple{
            background:#9333ea;
        }

        .icon{
            font-size:35px;
            margin-bottom:10px;
        }

    </style>
</head>
<body>

<div class="sidebar">

    <h3>🎓 SMS</h3>

    <a href="/dashboard"><i class="fas fa-home"></i> Dashboard</a>

    <a href="/add_student"><i class="fas fa-user-plus"></i> Add Student</a>

    <a href="/view_students"><i class="fas fa-users"></i> View Students</a>

    <a href="/search_student"><i class="fas fa-search"></i> Search Student</a>

    <a href="/attendance"><i class="fas fa-calendar-check"></i> Attendance</a>

    <a href="/view_attendance"><i class="fas fa-clipboard-list"></i> View Attendance</a>

    <a href="/attendance_report"><i class="fas fa-chart-bar"></i> Attendance Report</a>

    <a href="/add_marks"><i class="fas fa-file-circle-plus"></i> Add Marks</a>

    <a href="/view_marks"><i class="fas fa-file-lines"></i> View Marks</a>

    <a href="/marks_report"><i class="fas fa-chart-pie"></i> Marks Report</a>

    <a href="/logout"><i class="fas fa-sign-out-alt"></i> Logout</a>

</div>

<div class="main">

<div class="topbar d-flex justify-content-between align-items-center">

    <h4>Dashboard 👋</h4>

    <form action="/search_student" method="GET">

        <input
            type="text"
            name="keyword"
            placeholder="Search Student..."
            class="form-control">

    </form>

</div>
        <h4>Dashboard 👋</h4>

        <h5>Welcome Admin</h5>

    </div>

    <div class="row g-4">

        <div class="col-md-3">

            <div class="stat-card blue">

                <div class="icon">
                    <i class="fas fa-users"></i>
                </div>

                <h5>Total Students</h5>

                <h2>{{ total_students }}</h2>

            </div>

        </div>

        <div class="col-md-3">

            <div class="stat-card green">

                <div class="icon">
                    <i class="fas fa-calendar-check"></i>
                </div>

                <h5>Attendance</h5>

                <h2>100%</h2>

            </div>

        </div>

        <div class="col-md-3">

            <div class="stat-card orange">

                <div class="icon">
                    <i class="fas fa-book"></i>
                </div>

                <h5>Subjects</h5>

                <h2>0</h2>

            </div>

        </div>

        <div class="col-md-3">

            <div class="stat-card purple">

                <div class="icon">
                    <i class="fas fa-graduation-cap"></i>
                </div>

                <h5>Marks</h5>

                <h2>0</h2>

            </div>

        </div>

    </div>

</div>

</body>
</html>
