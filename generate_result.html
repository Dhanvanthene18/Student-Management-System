<!DOCTYPE html>
<html>

<head>

    <title>Generate Result</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

    <h2 class="mb-4">
        Generate Student Result
    </h2>

    <form method="POST">

        <div class="mb-3">

            <label class="form-label">
                Student
            </label>

            <select
                name="student_id"
                class="form-control"
                required>

                {% for student in students %}

                <option value="{{ student[0] }}">
                    {{ student[1] }}
                </option>

                {% endfor %}

            </select>

        </div>

        <div class="mb-3">

            <label class="form-label">
                Semester
            </label>

            <input
                type="number"
                name="semester"
                class="form-control"
                required>

        </div>

        <button class="btn btn-primary">
            Generate Result
        </button>

    </form>

</div>

</body>

</html>
