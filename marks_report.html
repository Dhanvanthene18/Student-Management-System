<!DOCTYPE html>
<html>
<head>
    <title>Marks Report</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h2>Average Marks Report</h2>

    <table class="table table-bordered table-striped">

        <tr>
            <th>Rank</th>
            <th>Student Name</th>
            <th>Average Marks</th>
        </tr>

        {% for row in data %}
        <tr>
            <td>{{ loop.index }}</td>
            <td>{{ row[0] }}</td>
            <td>{{ row[1]|round(2) }}</td>
        </tr>
        {% endfor %}

    </table>

</div>

</body>
</html>
