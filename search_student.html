<!DOCTYPE html>
<html>
<head>
    <title>Search Student</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h2>Search Student</h2>

    <form method="POST">

        <input type="text"
               name="keyword"
               class="form-control"
               placeholder="Enter Name or Department">

        <br>

        <button type="submit"
                class="btn btn-primary">
            Search
        </button>

    </form>

    <br>

    <table class="table table-bordered">

        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Department</th>
            <th>Year</th>
        </tr>

        {% for student in students %}
        <tr>
            <td>{{ student[0] }}</td>
            <td>{{ student[1] }}</td>
            <td>{{ student[2] }}</td>
            <td>{{ student[3] }}</td>
            <td>{{ student[4] }}</td>
        </tr>
        {% endfor %}

    </table>

</div>

</body>
</html>
