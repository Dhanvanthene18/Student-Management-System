<!DOCTYPE html>
<html>
<head>
    <title>Student ID Card</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:#f2f2f2;
        }

        .id-card{

            width:380px;

            margin:40px auto;

            border:3px solid #0d6efd;

            border-radius:15px;

            padding:20px;

            background:white;

            text-align:center;

            box-shadow:0px 0px 15px rgba(0,0,0,.2);

        }

        .photo{

            width:120px;

            height:120px;

            border-radius:50%;

            object-fit:cover;

            border:4px solid #0d6efd;

        }

        h3{

            margin-top:15px;

            color:#0d6efd;

        }

        table{

            margin-top:20px;

        }

    </style>

</head>

<body>

<div class="id-card">

    <h3>STUDENT ID CARD</h3>

    <hr>

    <img
        src="{{ url_for('uploaded_file', filename=student[5]) }}"
        class="photo">

    <table class="table">

        <tr>
            <th>Name</th>
            <td>{{ student[1] }}</td>
        </tr>

        <tr>
            <th>Email</th>
            <td>{{ student[2] }}</td>
        </tr>

        <tr>
            <th>Department</th>
            <td>{{ student[3] }}</td>
        </tr>

        <tr>
            <th>Year</th>
            <td>{{ student[4] }}</td>
        </tr>

    </table>

    <hr>

    <h5>Student Management System</h5>

    <button
        onclick="window.print()"
        class="btn btn-success">

        Print ID Card

    </button>

</div>

</body>
</html>
