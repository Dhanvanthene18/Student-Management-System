<!DOCTYPE html>
<html>
<head>
    <title>Student Profile</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h2>Student Profile</h2>

    <hr>

    <h4>{{ student[1] }}</h4>

    <p><b>Email:</b> {{ student[2] }}</p>

    <p><b>Department:</b> {{ student[3] }}</p>

    <p><b>Year:</b> {{ student[4] }}</p>

    <hr>

    <h4>Attendance Summary</h4>

    <p>
        Present Days:
        <b>{{ attendance_count }}</b>
    </p>

    <hr>

    <h4>Marks</h4>

    <table class="table table-bordered">

        <tr>
            <th>Subject</th>
            <th>Marks</th>
        </tr>

        {% for mark in marks %}

        <tr>
            <td>{{ mark[0] }}</td>
            <td>{{ mark[1] }}</td>
        </tr>

        {% endfor %}

    </table>

    <h5>
        Average Marks:
        {{ avg_marks }}
    </h5>

</div>

</body>
</html>
