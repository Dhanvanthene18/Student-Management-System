<!DOCTYPE html>
<html>
<head>

    <title>Placement Companies</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>

<div class="container mt-5">

    <h2 class="mb-4">Placement Companies</h2>

    <a href="/add_company" class="btn btn-primary mb-3">
        Add Company
    </a>

    <table class="table table-bordered table-striped">

        <thead class="table-dark">

            <tr>
                <th>ID</th>
                <th>Company</th>
                <th>Job Role</th>
                <th>Package (LPA)</th>
                <th>Eligibility CGPA</th>
                <th>Interview Date</th>
            </tr>

        </thead>

        <tbody>

        {% for company in companies %}

        <tr>

            <td>{{ company[0] }}</td>

            <td>{{ company[1] }}</td>

            <td>{{ company[2] }}</td>

            <td>{{ company[3] }}</td>

            <td>{{ company[4] }}</td>

            <td>{{ company[5] }}</td>

        </tr>

        {% endfor %}

        </tbody>

    </table>

</div>

</body>
</html>
