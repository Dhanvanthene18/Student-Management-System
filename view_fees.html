<!DOCTYPE html>
<html>
<head>
    <title>Fee Records</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h2 class="mb-4">Fee Records</h2>

    <a href="/add_fee" class="btn btn-primary mb-3">
        Add Fee
    </a>

    <table class="table table-bordered table-striped">

        <thead class="table-dark">

            <tr>
                <th>ID</th>
                <th>Student</th>
                <th>Total Fee</th>
                <th>Paid</th>
                <th>Balance</th>
                <th>Status</th>
            </tr>

        </thead>

        <tbody>

        {% for fee in records %}

        <tr>

            <td>{{ fee[0] }}</td>

            <td>{{ fee[1] }}</td>

            <td>₹ {{ fee[2] }}</td>

            <td>₹ {{ fee[3] }}</td>

            <td>₹ {{ fee[4] }}</td>

            <td>

                {% if fee[5] == 'Paid' %}

                    <span class="badge bg-success">
                        Paid
                    </span>

                {% elif fee[5] == 'Partial' %}

                    <span class="badge bg-warning text-dark">
                        Partial
                    </span>

                {% else %}

                    <span class="badge bg-danger">
                        Pending
                    </span>

                {% endif %}

            </td>

        </tr>

        {% endfor %}

        </tbody>

    </table>

</div>

</body>
</html>
