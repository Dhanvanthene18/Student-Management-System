<!DOCTYPE html>
<html>
<head>
    <title>View Marks</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h2>Marks Records</h2>

    <table class="table table-bordered table-striped">

        <tr>
            <th>ID</th>
            <th>Student</th>
            <th>Subject</th>
            <th>Marks</th>
        </tr>

        {% for row in records %}
        <tr>
            <td>{{ row[0] }}</td>
            <td>{{ row[1] }}</td>
            <td>{{ row[2] }}</td>
            <td>{{ row[3] }}</td>
        </tr>
        {% endfor %}

    </table>

</div>

</body>
</html>
