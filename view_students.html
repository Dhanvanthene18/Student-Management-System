<!DOCTYPE html>
<html>
<head>
    <title>View Students</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h2 class="mb-4">Student List</h2>

    <a href="/add_student" class="btn btn-primary mb-3">
        Add Student
    </a>

    <table class="table table-striped table-bordered">

        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Photo</th>
                <th>Name</th>
                <th>Email</th>
                <th>Department</th>
                <th>Year</th>
                <th>Action</th>
            </tr>
        </thead>

        <tbody>

        {% for student in students %}

            <tr>

                <td>{{ student[0] }}</td>

                <td>

    {% if student[5] %}

        <img
            src="{{ url_for('uploaded_file', filename=student[5]) }}"
            width="70"
            height="70"
            style="border-radius:50%; object-fit:cover;">

    {% else %}

        No Photo

    {% endif %}

</td>

                <td>
                    <a href="/student_profile/{{ student[0] }}">
                        {{ student[1] }}
                    </a>
                </td>

                <td>{{ student[2] }}</td>

                <td>{{ student[3] }}</td>

                <td>{{ student[4] }}</td>

                <td>

                    <a href="/student_profile/{{ student[0] }}"
                       class="btn btn-info btn-sm">
                        Profile
                    </a>

                    <a href="/update_student/{{ student[0] }}"
                       class="btn btn-warning btn-sm">
                        Edit
                    </a>

                    <a href="/delete_student/{{ student[0] }}"
                       class="btn btn-danger btn-sm"
                       onclick="return confirm('Are you sure you want to delete this student?')">
                        Delete
                    </a>

                </td>

            </tr>

        {% endfor %}

        </tbody>

    </table>

</div>

</body>
</html>
